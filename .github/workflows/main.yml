name: PDFHub CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: |
          package-lock.json
          backend/package-lock.json

    - name: Install Root & Frontend Dependencies
      run: npm ci

    - name: Install Backend Dependencies
      run: cd backend && npm ci

    - name: Frontend Type Check
      run: npm run typecheck
      continue-on-error: true

    - name: Backend Type Check
      run: cd backend && npx tsc --noEmit
      continue-on-error: true

    - name: Frontend Build
      run: npm run build
      env:
        NEXT_PUBLIC_API_URL: http://localhost:3001
        NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
        NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

    - name: Backend Build
      run: cd backend && npm run build

  docker-build:
    name: Build & Push Docker (Backend Worker)
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4
    
    # In a real scenario, you would login to Docker Hub or Oracle Cloud OCI Registry
    # - name: Log in to Docker Hub
    #   uses: docker/login-action@v3
    #   with:
    #     username: ${{ secrets.DOCKER_USERNAME }}
    #     password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        cd backend
        docker build -t pdfhub-worker:latest .
        
    # - name: Push Docker Image
    #   run: docker push pdfhub-worker:latest

  deploy-frontend:
    name: Deploy to Vercel
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4
    
    # Needs VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID in GitHub Secrets
    # - name: Deploy to Vercel
    #   run: npx vercel --prod --token ${{ secrets.VERCEL_TOKEN }}
    - name: Vercel Deploy Placeholder
      run: echo "Vercel deployment step (requires secrets configuration)"
